name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.png'
      - '**.svg'
      - 'mkdocs.yml'
      - 'mkdocs-zh.yml'
      - 'docs/**'
      - 'docs-zh/**'
      - 'stylesheets/**'
      - 'javascripts/**'
      - 'overrides/**'
      - 'docker-compose.yml'
      - 'serve.sh'
      - 'tools/**'
      - 'mkdocs-mermaid-renderer/**'
      - 'mkdocs-pdf-generate/**'
      - 'mkdocs-epub-generate/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and local plugins
        run: |
          pip install mkdocs-material pymdown-extensions
          pip install ./mkdocs-mermaid-renderer
          pip install ./mkdocs-pdf-generate ./mkdocs-epub-generate

      - name: Prepare MkDocs docs directories
        run: python3 tools/prepare_mkdocs_docs.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build English site
        run: mkdocs build

      - name: Build Chinese site
        run: mkdocs build -f mkdocs-zh.yml

      - name: Merge Pages artifact
        run: |
          rm -rf site-pages
          mkdir -p site-pages/zh
          cp -a site/. site-pages/
          cp -a site-zh/. site-pages/zh/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site-pages

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
