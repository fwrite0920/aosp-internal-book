name: Build Test

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.png'
      - '**.svg'
      - 'mkdocs.yml'
      - 'mkdocs-zh.yml'
      - 'docker-compose.yml'
      - 'serve.sh'
      - 'tools/**'
      - 'stylesheets/**'
      - 'javascripts/**'
      - 'overrides/**'
      - 'mkdocs-mermaid-renderer/**'
      - 'mkdocs-pdf-generate/**'
      - 'mkdocs-epub-generate/**'
      - '.github/workflows/build-test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and local plugins
        run: |
          pip install mkdocs-material pymdown-extensions
          pip install ./mkdocs-mermaid-renderer
          pip install ./mkdocs-pdf-generate ./mkdocs-epub-generate

      - name: Prepare MkDocs docs directories
        run: python3 tools/prepare_mkdocs_docs.py

      - name: Build English site
        run: mkdocs build 2>&1 | tail -20

      - name: Build Chinese site
        run: mkdocs build -f mkdocs-zh.yml 2>&1 | tail -20

      - name: Verify output
        run: |
          echo "English pages: $(find site -name '*.html' | wc -l)"
          echo "English size: $(du -sh site/ | cut -f1)"
          echo "Chinese pages: $(find site-zh -name '*.html' | wc -l)"
          echo "Chinese size: $(du -sh site-zh/ | cut -f1)"
