site_name: "AOSP Internals"
site_description: "A Developer's Guide to the Android Open Source Project"
docs_dir: "docs"
site_dir: "site"

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - pdf-generate:
      enabled: !ENV [MKDOCS_PDF, false]
      concurrency: 8
      output: aosp-internals.pdf
      cover: cover.svg
      timeout: 30000
      stylesheets:
        - docs/stylesheets/pdf.css
  - epub-generate:
      enabled: !ENV [MKDOCS_EPUB, false]
      output: aosp-internals.epub
      cover: cover.svg
      timeout: 30000
      stylesheets:
        - docs/stylesheets/epub.css

extra_javascript:
  - javascripts/mermaid-zoom.js?v=4

extra_css:
  - stylesheets/mermaid-zoom.css?v=4

