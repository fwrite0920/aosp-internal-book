services:
  serve:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs serve -a 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/book

  serve-zh:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs serve -f mkdocs-zh.yml -a 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/book

  build-site:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs build"
    volumes:
      - .:/book

  build-site-zh:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs build -f mkdocs-zh.yml"
    volumes:
      - .:/book

  build-pdf:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs build"
    environment:
      - MKDOCS_PDF=true
    volumes:
      - .:/book

  build-pdf-zh:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs build -f mkdocs-zh.yml"
    environment:
      - MKDOCS_PDF=true
    volumes:
      - .:/book

  build-epub:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs build"
    environment:
      - MKDOCS_EPUB=true
    volumes:
      - .:/book

  build-epub-zh:
    build: .
    command: bash -lc "python3 tools/prepare_mkdocs_docs.py && mkdocs build -f mkdocs-zh.yml"
    environment:
      - MKDOCS_EPUB=true
    volumes:
      - .:/book
