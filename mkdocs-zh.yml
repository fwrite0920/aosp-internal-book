site_name: "AOSP Internals（中文版）"
site_description: "Android Open Source Project 开发者指南（中文版）"
site_url: "https://aospbooks.github.io/aosp-internal-book/zh/"
docs_dir: "docs-zh"
site_dir: "site-zh"

theme:
  name: material
  custom_dir: overrides
  favicon: favicon.png
  logo: favicon.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - pdf-generate:
      enabled: !ENV [MKDOCS_PDF, false]
      concurrency: 8
      output: aosp-internals-zh.pdf
      timeout: 30000
      stylesheets:
        - stylesheets/pdf.css
  - epub-generate:
      enabled: !ENV [MKDOCS_EPUB, false]
      output: aosp-internals-zh.epub
      timeout: 30000
      stylesheets:
        - stylesheets/epub.css

extra_javascript:
  - javascripts/mermaid-zoom.js?v=4

extra_css:
  - stylesheets/mermaid-zoom.css?v=4

